<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Fix Anything Blog logo</title>
  <desc id="logoDesc">A rounded square with code brackets and the letters FA beside the Fix Anything Blog wordmark.</desc>
  <defs>
    <linearGradient id="logoTile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <rect x="6" y="8" width="80" height="80" rx="24" fill="url(#logoTile)" />
  <path d="M33 34 22 48l11 14" fill="none" stroke="#a7f3d0" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
  <path d="M59 34 70 48 59 62" fill="none" stroke="#a7f3d0" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
  <path d="M40 64 49 32" fill="none" stroke="url(#logoAccent)" stroke-linecap="round" stroke-width="6" />

  <text x="104" y="42" fill="#111827" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="14" font-weight="700" letter-spacing="4">
    BLOG
  </text>
  <text x="104" y="68" fill="#111827" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="34" font-weight="800">
    Fix Anything
  </text>
  <circle cx="324" cy="48" r="20" fill="#ecfdf5" />
  <text x="324" y="55" fill="#047857" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="18" font-weight="800" text-anchor="middle">
    FA
  </text>
</svg>
