<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF3E00"/>
    </linearGradient>
    <linearGradient id="fixGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF9A6C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="#ffffff08" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="#ffffff08" stroke-width="1"/>

  <!-- Wrench icon -->
  <g transform="translate(30, 35) rotate(-45, 30, 30)" filter="url(#glow)">
    <!-- Wrench body -->
    <rect x="22" y="10" width="16" height="45" rx="4" fill="url(#wrenchGrad)"/>
    <!-- Wrench head top -->
    <circle cx="30" cy="10" r="12" fill="none" stroke="url(#wrenchGrad)" stroke-width="6"/>
    <circle cx="30" cy="10" r="5" fill="#0f0f0f"/>
    <!-- Wrench head bottom -->
    <path d="M 18 55 Q 30 65 42 55" fill="url(#wrenchGrad)"/>
  </g>

  <!-- Spark / lightning bolt accent -->
  <polygon points="82,38 74,62 82,58 76,82 92,54 83,58" fill="#FFD700" opacity="0.9" filter="url(#glow)"/>

  <!-- FIX text -->
  <text
    x="105"
    y="95"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="68"
    font-weight="900"
    font-style="italic"
    fill="url(#fixGrad)"
    filter="url(#subtleGlow)"
    letter-spacing="-2"
  >FIX</text>

  <!-- ANYTHING text -->
  <text
    x="108"
    y="128"
    font-family="'Courier New', 'Courier', monospace"
    font-size="26"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="8"
    opacity="0.85"
  >ANYTHING</text>

  <!-- Underline accent -->
  <rect x="105" y="136" width="272" height="3" rx="2" fill="url(#fixGrad)" opacity="0.6"/>

  <!-- Corner dot accents -->
  <circle cx="375" cy="25" r="4" fill="#FF6B35" opacity="0.7"/>
  <circle cx="375" cy="38" r="2" fill="#FF6B35" opacity="0.4"/>
  <circle cx="375" cy="47" r="1.5" fill="#FF6B35" opacity="0.2"/>
</svg>
